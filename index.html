<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>南青山5丁目 周辺 保育園マップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; }
    #map { height: 100vh; }
    .legend {
      position: fixed; bottom: 30px; left: 10px;
      background: white; padding: 12px 16px;
      border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      z-index: 1000; font-size: 13px; line-height: 1.8;
    }
    .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 6px; }
    .popup-title { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
    .popup-info { font-size: 12px; color: #444; line-height: 1.6; }
  </style>
</head>
<body>
<div id="map"></div>
<div class="legend">
  <b>🗺️ 南青山5丁目 周辺 保育園</b><br>
  <span class="dot" style="background:#e74c3c"></span> 自宅<br>
  <span class="dot" style="background:#2980b9"></span> 港区立 認可保育園<br>
  <span class="dot" style="background:#27ae60"></span> 私立 認可保育園<br>
  <span class="dot" style="background:#f39c12"></span> 港区保育室
</div>

<script>
const map = L.map('map').setView([35.6668, 139.7182], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.5)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -10]
  });
}

function addPin(lat, lng, color, title, info) {
  L.marker([lat, lng], {icon: makeIcon(color)})
    .addTo(map)
    .bindPopup(`<div class="popup-title">${title}</div><div class="popup-info">${info.replace(/\n/g,'<br>')}</div>`);
}

// 自宅
addPin(35.66680, 139.71820, '#e74c3c', '🏠 自宅（起点）', '東京都港区南青山5丁目4-11');

// 港区立 認可保育園
addPin(35.66310, 139.72050, '#2980b9', '西麻布保育園', '住所：西麻布2-13-3\n電話：03-3409-4924\n区分：港区立・認可\n約600m・徒歩8分');
addPin(35.67210, 139.71720, '#2980b9', '青山保育園', '住所：北青山3-4-1-101\n電話：03-3401-1723\n区分：港区立・認可\n約700m・徒歩9分');
addPin(35.67200, 139.71530, '#2980b9', '南青山保育園（区立）', '住所：南青山1-3-15\n電話：03-3401-1650\n区分：港区立・認可\n約1.2km・徒歩15分');
addPin(35.66060, 139.73050, '#2980b9', '麻布保育園', '住所：六本木5-16-46\n電話：03-5545-7135\n区分：港区立・認可\n約1.3km・徒歩16分');
addPin(35.67200, 139.72800, '#2980b9', '赤坂保育園', '住所：赤坂5-5-26-101\n電話：03-3583-2155\n区分：港区立・認可\n約1.4km・徒歩17分');
addPin(35.65960, 139.73500, '#2980b9', '飯倉保育園', '住所：東麻布1-21-2\n電話：03-3583-1786\n区分：港区立・認可\n約1.5km・徒歩18分');

// 私立 認可保育園
addPin(35.66900, 139.71750, '#27ae60', '⭐ 太陽の子南青山保育園', '住所：南青山4-1-6\n電話：03-5413-5512\n区分：私立・認可\n約400m・徒歩5分（最近！）');
addPin(35.66780, 139.71650, '#27ae60', '小学館アカデミー南青山保育園', '住所：南青山4-15-8\n電話：03-5770-1512\n区分：私立・認可\n約500m・徒歩7分');
addPin(35.67200, 139.71730, '#27ae60', 'おはよう保育園ののあおやま', '住所：北青山3-4-3（ののあおやま1F）\n区分：私立・認可\n約700m・徒歩9分');
addPin(35.67160, 139.71540, '#27ae60', 'アイグラン保育園青山一丁目', '住所：南青山1-3-1\n電話：03-6459-2860\n区分：私立・認可\n約1.2km・徒歩15分');
addPin(35.67360, 139.72510, '#27ae60', '赤坂ちとせ保育園', '住所：赤坂4-7-15\n電話：03-6459-1012\n区分：私立・認可\n約1.5km・徒歩18分');
addPin(35.66720, 139.71430, '#27ae60', 'まちの保育園南青山', '住所：南青山エリア（要確認）\n区分：私立・認可');

// 港区保育室
addPin(35.67100, 139.71900, '#f39c12', '青南保育室', '運営：アソシエ・インターナショナル\n区分：港区保育室\n住所：要確認');
addPin(35.67050, 139.71950, '#f39c12', '第二青南保育室', '運営：アソシエ・インターナショナル\n区分：港区保育室\n住所：要確認');
</script>
</body>
</html>
